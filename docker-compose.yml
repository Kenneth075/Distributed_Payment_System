version: '3.9'

services:

  # -------------------------------------------------------
  # PostgreSQL — local development database
  # -------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: payment-postgres
    environment:
      POSTGRES_DB: payment_authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 3025
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d payment_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # Ledger Mock — simulates the downstream ledger service
  # -------------------------------------------------------
  ledger-mock:
    build:
      context: ../ledger-mock
      dockerfile: Dockerfile
    container_name: ledger-mock
    ports:
      - "9090:9090"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9090/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # Payment Auth Service
  # -------------------------------------------------------
  payment-auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-auth-service
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://localhost:5432/payment_authdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      LEDGER_URL: http://ledger-mock:9090
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      ledger-mock:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: