# Datasource Configuration
spring.datasource.url=jdbc:h2:mem:payment_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Flyway Configuration
# Flyway uses PostgreSQL-specific SQL; let Hibernate manage schema for H2 tests
spring.flyway.enabled=false

# Logging Configuration
logging.level.com.kennycode.distributedpaymentsystem=DEBUG